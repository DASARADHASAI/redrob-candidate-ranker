# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) for: extracting and summarizing the hackathon bundle
  docs (JD, submission spec, schema, signals doc), inspecting the real
  candidates.jsonl data to find concrete trap patterns (e.g. a Backend
  Engineer with "advanced" self-rated NLP/CV/Speech skills but low
  skill_assessment_scores — a corroboration mismatch), designing the
  rule-based scoring approach, writing rank.py, and iterating on output
  quality (reasoning variety, capitalization, runtime/memory testing). No
  candidate data was sent to any hosted LLM API as part of the ranking step
  itself; rank.py makes zero network calls and has zero third-party
  dependencies.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Transparent rule-based ranker with a light, curated text-similarity term.
  Title/career-history evidence ("domain_relevance") gates how much credit a
  candidate's skills list can earn, directly defeating the keyword-stuffing
  trap (an AI-keyword-stuffed "Marketing Manager" cannot outrank a real
  ranking/search engineer). The four "absolutely need" skill areas
  (embeddings/retrieval, vector DB/hybrid search, Python, ranking-evaluation)
  are matched against skills[], then weighted by duration_months,
  endorsements, and cross-checked against redrob_signals.skill_assessment_scores
  to discount inflated self-rated proficiency. JD disqualifiers (consulting-only
  career, research-only, LangChain-only <12mo AI exposure, architecture-only
  18mo+ with no code, CV/speech/robotics without NLP/IR, title-chasing) are
  multiplicative penalties, not hard cutoffs. Years-of-experience, location,
  and notice period are smooth soft-preference functions, not filters.
  Behavioral signals (recency, recruiter response rate, open_to_work,
  verification) act as a bounded multiplicative availability modifier. Two
  honeypot heuristics (expert-proficiency-with-~0-duration; career-history
  duration inconsistent with stated years_of_experience) exclude 68
  candidates pre-ranking. Runtime ~18s / ~660MB peak RAM on a 4-core
  CPU-only sandbox for the full 100K pool.

